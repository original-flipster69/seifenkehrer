version: 2

project_name: seifenkehrer

before:
  hooks:
    - go mod tidy

builds:
  - id: seifenkehrer
    binary: seifenkehrer
    main: ./
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/original-flipster69/seifenkehrer/cmd.version=v{{.Version}}

archives:
  - id: default
    name_template: "seifenkehrer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README*
      - src: ".tasks/*.yaml"
        dst: tasks
        strip_parent: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: original-flipster69
    name: seifenkehrer
  draft: false
  prerelease: auto

# To publish a Homebrew formula on every release:
#   1. Create a public repo at github.com/original-flipster69/homebrew-sk
#   2. Generate a fine-grained PAT with contents:write on that repo
#      and add it to this repo's secrets as HOMEBREW_TAP_GITHUB_TOKEN.
#   3. Uncomment the block below and the env line in .github/workflows/release.yaml.
#
